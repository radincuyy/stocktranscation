services:
  postgres:
    image: postgres:16-alpine
    container_name: studycasempa-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mpa
      POSTGRES_PASSWORD: mpa_secret
      POSTGRES_DB: studycasempa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mpa -d studycasempa"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
